site_name: PlexusOne Apps
site_description: Multi-agent orchestration platform for AI CLI tools
site_url: https://plexusone.github.io/plexusone-app/

repo_name: plexusone/plexusone-app
repo_url: https://github.com/plexusone/plexusone-app

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Requirements: getting-started/requirements.md
  - User Guide:
    - Desktop App:
      - Overview: guide/desktop/overview.md
      - Grid Layout: guide/desktop/grid-layout.md
      - Session Management: guide/desktop/sessions.md
      - Multi-Window: guide/desktop/multi-window.md
      - Keyboard Shortcuts: guide/desktop/shortcuts.md
    - Mobile Apps:
      - Overview: guide/mobile/overview.md
      - Connecting: guide/mobile/connecting.md
  - Reference:
    - Configuration: reference/configuration.md
    - WebSocket Protocol: reference/protocol.md
  - Development:
    - Architecture: development/architecture.md
    - Desktop App: development/desktop.md
    - Flutter App: development/flutter.md
    - Native iOS App: development/ios.md
    - Contributing: development/contributing.md
    - Design Documents: development/design-docs.md
  - Releases:
    - Changelog: releases/changelog.md
    - v0.4.0: releases/v0.4.0.md
    - v0.3.0: releases/v0.3.0.md
    - v0.2.0: releases/v0.2.0.md
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/plexusone-app

copyright: Copyright &copy; 2024 PlexusOne
